<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SSE Demo</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: sans-serif; padding: 20px; max-width: 600px; margin: auto; }
h2 { margin-bottom: 10px; }
#events { border: 1px solid #ccc; height: 300px; overflow-y: auto; padding: 10px; }
#events div { margin: 4px 0; }
.event { color: #0066cc; }
.connected { color: #090; font-style: italic; }
.disconnected { color: #999; font-style: italic; }
button { padding: 8px 16px; margin-bottom: 10px; }
</style>
</head>
<body>
<h2>SSE Events</h2>
<button onclick="connect()">Connect</button>
<button onclick="window.open('/sse/clock')">Loop SSE</button>
<button onclick="window.open('/sse/news')">Emitter SSE</button>
<div id="events"></div>
<script>
let es = null;
const events = document.getElementById('events');
function log(text, cls) { const d = document.createElement('div'); d.className = cls; d.textContent = text; events.appendChild(d); events.scrollTop = events.scrollHeight; }
function connect() {
    if (es) { es.close(); }
    es = new EventSource('/sse/news');
    log('Connecting to /sse/news...', 'connected');
    es.addEventListener('news', e => log('news: ' + e.data, 'event'));
    es.onopen = () => log('SSE connected', 'connected');
    es.onerror = () => log('Connection lost / reconnecting...', 'disconnected');
}
</script>
</body>
</html>
