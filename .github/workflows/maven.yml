name: Java CI

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'
      - 'SECURITY*'
      - 'note.txt'
      - '.github/ISSUE_TEMPLATE/**'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'
      - 'SECURITY*'
      - 'note.txt'
      - '.github/ISSUE_TEMPLATE/**'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: [11, 17, 21]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'
          cache: maven

      - name: Build and test on JDK ${{ matrix.java }}
        run: mvn verify -pl wastnet-test -am --batch-mode

      # 每个 JDK 上传自己的 XML 报告（Codecov 自动聚合）
      - name: Upload JaCoCo XML report for JDK ${{ matrix.java }}
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report-jdk-${{ matrix.java }}
          path: wastnet-test/target/site/jacoco-aggregate/jacoco.xml

  # 下载所有 XML 报告并上传到 Codecov
  coverage:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all JaCoCo reports
        uses: actions/download-artifact@v4
        with:
          path: coverage-reports

      - name: Upload to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: coverage-reports/**/jacoco.xml
          flags: unittests
          name: wastnet-codecov
          fail_ci_if_error: false
